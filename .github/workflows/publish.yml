name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Publishing uses PyPI's trusted-publisher OIDC flow — no API tokens stored
# in this repo. The "pypi" environment must be configured on PyPI under the
# project's Settings → Publishing tab, with this workflow file path
# registered. See CLAUDE.md for the one-time setup details.

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/postgrip-agent/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
