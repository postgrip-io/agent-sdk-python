name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: python -m pip wheel --no-deps . -w /tmp/wheel
      - name: Install
        run: python -m pip install /tmp/wheel/postgrip_agent-*.whl
      - name: Test
        run: PYTHONPATH=src python -m unittest discover -s test
