name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: python -m pip wheel --no-deps . -w /tmp/wheel
      - name: Install
        run: python -m pip install /tmp/wheel/postgrip_agent-*.whl
      - name: Test
        run: PYTHONPATH=src python -m unittest discover -s test

  # Pull the cross-language drift check from the protocol repo so a
  # Python-side type change that diverges from Go fails CI here, not
  # only in agent-sdk-protocol's CI when somebody bumps Go next.
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: fetch drift check from agent-sdk-protocol
        run: |
          mkdir -p tools
          curl -fsSL https://raw.githubusercontent.com/postgrip-io/agent-sdk-protocol/main/tools/check_drift.py -o tools/check_drift.py
      - name: check drift against agent-sdk-protocol and agent-sdk-typescript
        run: python3 tools/check_drift.py --local python --from-github
