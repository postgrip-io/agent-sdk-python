site_name: PostGrip Agent — Python SDK
site_description: Python SDK for the PostGrip Agent runtime service. Tasks, workflows, schedules, and a polling agent.
site_url: https://postgrip-io.github.io/agent-sdk-python/
repo_url: https://github.com/postgrip-io/agent-sdk-python
repo_name: postgrip-io/agent-sdk-python
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/postgrip-io/agent-sdk-python
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/postgrip-agent/
  generator: false

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick start: quickstart.md
  - Workflow runtime: workflow-runtime.md
  - API: api.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
